<header class="nxl-header">
    <div class="header-wrapper">
        <div class="header-left d-flex align-items-center gap-4">
            <a href="javascript:void(0);" class="nxl-head-mobile-toggler" id="mobile-collapse">
                <div class="hamburger hamburger--arrowturn">
                    <div class="hamburger-box">
                        <div class="hamburger-inner"></div>
                    </div>
                </div>
            </a>
            <div class="nxl-navigation-toggle">
                <a href="javascript:void(0);" id="menu-mini-button">
                    <i class="feather-align-left"></i>
                </a>
                <a href="javascript:void(0);" id="menu-expend-button">
                    <i class="feather-arrow-right"></i>
                </a>
            </div>
        </div>
        <div class="header-right ms-auto">
            <div class="d-flex align-items-center">
                <div class="nxl-h-item dark-light-theme">
                    <button type="button" id="themeToggle" class="nxl-head-link me-2 app-theme-toggle" aria-label="Alternar dark mode">
                        <i class="feather-moon app-theme-icon-dark"></i>
                        <i class="feather-sun app-theme-icon-light"></i>
                    </button>
                </div>
                <div class="nxl-h-item app-profile-dropdown">
                    <button
                        type="button"
                        id="profileDropdownToggle"
                        class="nxl-head-link me-0 app-profile-dropdown-toggle"
                        aria-controls="profileDropdownMenu"
                        aria-haspopup="menu"
                        aria-expanded="false"
                        aria-label="Abrir menu do perfil"
                    >
                        {% if request.user.avatar %}
                        <img src="{{ request.user.avatar.url }}" alt="{{ request.user.name|default:request.user.email }}" class="rounded-circle" style="width: 28px; height: 28px; object-fit: cover;">
                        {% else %}
                        <i class="feather-user"></i>
                        {% endif %}
                    </button>
                    <div id="profileDropdownMenu" class="dropdown-menu dropdown-menu-end nxl-h-dropdown nxl-user-dropdown app-user-dropdown app-profile-dropdown-menu" hidden style="min-width: 240px;">
                        <div class="dropdown-item-text d-flex align-items-center gap-3">
                            {% if request.user.avatar %}
                            <img src="{{ request.user.avatar.url }}" alt="{{ request.user.name|default:request.user.email }}" class="rounded-circle" style="width: 40px; height: 40px; object-fit: cover;">
                            {% else %}
                            <div class="avatar-text avatar-sm bg-soft-primary text-primary">{{ request.user.name|default:request.user.email|first|upper }}</div>
                            {% endif %}
                            <div class="min-w-0">
                                <div class="fw-bold text-truncate">{{ request.user.name|default:request.user.email }}</div>
                                <small class="text-muted text-truncate d-block">{{ request.user.email }}</small>
                            </div>
                        </div>
                        <div class="dropdown-divider"></div>
                        <a class="dropdown-item" href="{% url 'accounts:profile' %}">
                            <i class="feather-user"></i>
                            <span>Meu perfil</span>
                        </a>
                        <a class="dropdown-item" href="{% url 'accounts:password_change' %}">
                            <i class="feather-lock"></i>
                            <span>Alterar senha</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        <form action="{% url 'accounts:logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="dropdown-item">
                                <i class="feather-log-out"></i>
                                <span>Sair</span>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
